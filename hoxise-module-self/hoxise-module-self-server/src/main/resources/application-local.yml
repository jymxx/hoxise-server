#本地配置
server:
  port: 18004

##########   数据库   ##########
spring:
  #redis配置
  data:
    redis:
      # Redis数据库索引
      database: 8
      # 连接地址
      host: localhost
      # 连接端口
      port: 6379

  # openai
  ai:
    openai:
      # API密钥
      api-key: ${deepseek.api.key}
      # OpenAi规范的API端点
      #      base-url: https://api.deepseek.com
      chat:
        options:
          # 可选模型：deepseek-chat(非思考模式), deepseek-reasoner (思考模式)
          model: deepseek-chat
          # 回答随机性 默认1
          temperature: 1
          # 最大返回token
          max-tokens: 5000
    #deepseek
    deepseek:
      api-key: ${deepseek.api.key}
      base-url: https://api.deepseek.com
      chat:
        options:
          model: deepseek-reasoner

    # 聊天记忆持久化
    chat:
      memory:
        repository:
          jdbc:
            # 可选值 embedded(默认,只有嵌入式数据库才建表) 、always(自动建表)、 never
            initialize-schema: never
    # 向量数据库
    vectorstore:
      # 向量模型 hoxise自定义 因为spring-ai没有给单独的向量模型配置
      embeddingModel:
        api-key: ${aliyun.bailian.ai.api.key}
        base-url: https://dashscope.aliyuncs.com/compatible-mode
        model: text-embedding-v4
      # 需要redis-stack
      redis:
        # 是否初始化索引 默认false
        initialize-schema: false
        index-name: spring-ai-index
        prefix: "embedding:"


##########   其它配置   ##########

hoxise:
  #工作目录
  workDir: D:\Java\Project\env\work-dir